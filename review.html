<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Tempat - Bukber Alumni</title>
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</head>

<body class="bg-halaman-review">

    <div class="container py-4">
        <a href="voting.html" class="btn-kembali mb-4"><i class="bi bi-chevron-left"></i> KEMBALI</a>

        <div class="card card-review shadow mx-auto">
            
            <div id="carouselExampleDark" class="carousel carousel-dark slide" data-bs-ride="carousel">
                <div class="carousel-indicators" id="carousel-indicators-dynamic"></div>
                <div class="carousel-inner" id="slider-foto"></div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>

            <div class="p-3 border-bottom d-flex justify-content-between align-items-center flex-wrap bg-light-custom">
                <h3 class="mb-0 fw-bold text-success" id="nama-tempat">Nama Tempat</h3>
                <span class="text-muted" id="lokasi-tempat"><i class="bi bi-geo-alt-fill text-danger"></i> Lokasi</span>
                <span class="fw-bold text-warning" id="rating-tempat"><i class="bi bi-star-fill"></i> 0.0/5</span>
            </div>

            <div class="p-4">
                <div class="row text-center mb-4 g-3">
                    <div class="col-4 border-end">
                        <div class="fw-bold text-muted small">HARGA</div>
                        <div class="fw-bold text-success mt-1" id="harga-tempat">Rp -</div>
                    </div>
                    <div class="col-4 border-end">
                        <div class="fw-bold text-muted small">KAPASITAS</div>
                        <div class="fw-bold text-dark mt-1" id="kapasitas-tempat">- orang</div>
                    </div>
                    <div class="col-4">
                        <div class="fw-bold text-muted small">PAKIRAN</div>
                        <div class="fw-bold text-primary mt-1" id="parkiran-tempat">-</div>
                    </div>
                </div>

                <div class="menu-rekomendasi-section">
                    <h6 class="fw-bold text-muted mb-3">REKOMENDASI MENU:</h6>
                    <div class="d-flex flex-wrap gap-2 justify-content-center" id="list-menu"></div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
