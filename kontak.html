<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting Bukber - Nabila Sri Apriani</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>

</head> 

<body class="bg-halaman-kontak">

    <div class="d-flex justify-content-center mt-5 mb-4"> 
        <div class="btn-group" role="group" aria-label="Basic example">
            <a href="index.html" class="btn btn-success">HOME</a>
            <a href="voting.html" class="btn btn-success">VOTING</a>
            <a href="jadwal.html" class="btn btn-success">JADWAL</a>
            <a href="menu.html" class="btn btn-success">MENU</a>
            <a href="bayar.html" class="btn btn-success">BAYAR</a>
            <a href="galeri.html" class="btn btn-success">GALERI</a>
            <a href="kontak.html" class="btn btn-success">KONTAK</a>
        </div>
    </div>
    
    <div class="container py-5 d-flex justify-content-center">
        <div id="form-kontak-input" class="card p-4 p-md-5 shadow-lg border-success bg-white" style="max-width: 600px; width: 100%; border-radius: 25px; display: block;">
            <form onsubmit="simpanKontak(event)">
                
                <div class="row mb-4 g-3 align-items-center">
                    <div class="col-sm-3">
                        <label for="inputNama" class="form-label fw-bold mb-0 text-dark">NAMA</label>
                    </div>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" id="inputNama" placeholder="silahkan masukkan nama lengkap anda" required>
                    </div>
                </div>

                <div class="row mb-5 g-3 align-items-center">
                    <div class="col-sm-3">
                        <label for="inputTelp" class="form-label fw-bold mb-0 text-dark">No. Telpon</label>
                    </div>
                    <div class="col-sm-9">
                        <input type="tel" class="form-control" id="inputTelp" placeholder="silahkan masukkan nomor telpon anda" required>
                    </div>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-outline-dark px-5 py-2 fw-bold text-uppercase" style="border-radius: 10px;">SIMPAN</button>
                </div>
                
            </form>
        </div>

        <div id="hasil-kontak-display" class="card p-4 p-md-5 shadow-lg border-success bg-white" style="max-width: 600px; width: 100%; border-radius: 25px; display: none;">
            
            <div class="row mb-4 g-3 align-items-center">
                <div class="col-sm-3">
                    <div class="fw-bold text-dark">NAMA</div>
                </div>
                <div class="col-sm-9">
                    <div class="fw-semibold text-uppercase fs-5" id="text-nama-tercatat">: -</div>
                </div>
            </div>

            <div class="row mb-4 g-3 align-items-center">
                <div class="col-sm-3">
                    <div class="fw-bold text-dark">No. Telpon</div>
                </div>
                <div class="col-sm-9">
                    <div class="fw-semibold fs-5" id="text-telp-tercatat">: -</div>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
