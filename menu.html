<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Bukber-Nabila Sri Apriani</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>


</head>

<body class="bg-halaman-menu">
    <div class="d-flex justify-content-center mt-5"> 
        
        <div class="btn-group" role="group" aria-label="Basic example">
            <a href="index.html" class="btn btn-success">HOME</a>
            <a href="voting.html" class="btn btn-success">VOTING</a>
            <a href="jadwal.html" class="btn btn-success">JADWAL</a>
            <a href="menu.html" class="btn btn-success">MENU</a>
            <a href="bayar.html" class="btn btn-success">BAYAR</a>
            <a href="galeri.html" class="btn btn-success">GALERI</a>
            <a href="kontak.html" class="btn btn-success">KONTAK</a>
        </div>

    </div>


    <div class="container my-5 d-flex justify-content-center">
        <div class="card p-4 shadow-lg" style="max-width: 1100px; width: 100%; background-color: #ffffff; border: 3px solid #d9a752; border-radius: 25px;">
            
            <h3 class="text-center fw-bold text-uppercase mb-4" style="color: #0f3424;">Silahkan Pilih Menu Bukber</h3>
            
            <div class="row g-3 justify-content-center">
                
                <div class="col-md-3 col-sm-6">
                    <div class="card h-100 text-center border-2 border-dark rounded-3 overflow-hidden">
                        <div class="bg-dark text-white fw-bold py-2 text-uppercase">TAKJIL</div>
                        <div class="p-2" style="height: 120px; display: flex; align-items: center; justify-content: center;">
                            <img id="img-takjil" src="kurma.jpeg" class="img-fluid rounded" style="max-height: 100%; object-fit: cover;">
                        </div>
                        <div class="card-body p-2 d-flex flex-column justify-content-between">
                            <h6 class="fw-bold m-0" style="color: #d9a752;">Rp <span id="price-takjil">10000</span></h6>
                            <div class="d-flex justify-content-between align-items-center my-2 px-2">
                                <button class="btn btn-sm btn-outline-dark" onclick="changeMenu('takjil', -1)"><i class="bi bi-chevron-left"></i></button>
                                <span id="name-takjil" class="fw-bold small text-uppercase">Kurma</span>
                                <button class="btn btn-sm btn-outline-dark" onclick="changeMenu('takjil', 1)"><i class="bi bi-chevron-right"></i></button>
                            </div>
                            <div class="d-flex justify-content-center align-items-center gap-2 mt-2">
                                <button class="btn btn-sm btn-success" onclick="changeQty('takjil', 1)"><i class="bi bi-plus-lg"></i></button>
                                <span id="qty-takjil" class="fw-bold px-3 border border-secondary rounded bg-light">0</span>
                                <button class="btn btn-sm btn-danger" onclick="changeQty('takjil', -1)"><i class="bi bi-dash-lg"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 col-sm-6">
                    <div class="card h-100 text-center border-2 border-dark rounded-3 overflow-hidden">
                        <div class="bg-dark text-white fw-bold py-2 text-uppercase">MAKANAN</div>
                        <div class="p-2" style="height: 120px; display: flex; align-items: center; justify-content: center;">
                            <img id="img-makanan" src="ayampecak.jpeg" class="img-fluid rounded" style="max-height: 100%; object-fit: cover;">
                        </div>
                        <div class="card-body p-2 d-flex flex-column justify-content-between">
                            <h6 class="fw-bold m-0" style="color: #d9a752;">Rp <span id="price-makanan">20000</span></h6>
                            <div class="d-flex justify-content-between align-items-center my-2 px-2">
                                <button class="btn btn-sm btn-outline-dark" onclick="changeMenu('makanan', -1)"><i class="bi bi-chevron-left"></i></button>
                                <span id="name-makanan" class="fw-bold small text-uppercase">Nasi + Ayam samabal pecak</span>
                                <button class="btn btn-sm btn-outline-dark" onclick="changeMenu('makanan', 1)"><i class="bi bi-chevron-right"></i></button>
                            </div>
                            <div class="d-flex justify-content-center align-items-center gap-2 mt-2">
                                <button class="btn btn-sm btn-success" onclick="changeQty('makanan', 1)"><i class="bi bi-plus-lg"></i></button>
                                <span id="qty-makanan" class="fw-bold px-3 border border-secondary rounded bg-light">0</span>
                                <button class="btn btn-sm btn-danger" onclick="changeQty('makanan', -1)"><i class="bi bi-dash-lg"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 col-sm-6">
                    <div class="card h-100 text-center border-2 border-dark rounded-3 overflow-hidden">
                        <div class="bg-dark text-white fw-bold py-2 text-uppercase">MINUMAN</div>
                        <div class="p-2" style="height: 120px; display: flex; align-items: center; justify-content: center;">
                            <img id="img-minuman" src="coklat.jpeg" class="img-fluid rounded" style="max-height: 100%; object-fit: cover;">
                        </div>
                        <div class="card-body p-2 d-flex flex-column justify-content-between">
                            <h6 class="fw-bold m-0" style="color: #d9a752;">Rp <span id="price-minuman">15000</span></h6>
                            <div class="d-flex justify-content-between align-items-center my-2 px-2">
                                <button class="btn btn-sm btn-outline-dark" onclick="changeMenu('minuman', -1)"><i class="bi bi-chevron-left"></i></button>
                                <span id="name-minuman" class="fw-bold small text-uppercase">Coklat</span>
                                <button class="btn btn-sm btn-outline-dark" onclick="changeMenu('minuman', 1)"><i class="bi bi-chevron-right"></i></button>
                            </div>
                            <div class="d-flex justify-content-center align-items-center gap-2 mt-2">
                                <button class="btn btn-sm btn-success" onclick="changeQty('minuman', 1)"><i class="bi bi-plus-lg"></i></button>
                                <span id="qty-minuman" class="fw-bold px-3 border border-secondary rounded bg-light">0</span>
                                <button class="btn btn-sm btn-danger" onclick="changeQty('minuman', -1)"><i class="bi bi-dash-lg"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 col-sm-6">
                    <div class="card h-100 text-center border-2 border-dark rounded-3 overflow-hidden">
                        <div class="bg-dark text-white fw-bold py-2 text-uppercase">PAKET</div>
                        <div class="p-2" style="height: 120px; display: flex; align-items: center; justify-content: center;">
                            <img id="img-paket" src="paket1.jpeg" class="img-fluid rounded" style="max-height: 100%; object-fit: cover;">
                        </div>
                        <div class="card-body p-2 d-flex flex-column justify-content-between">
                            <h6 class="fw-bold m-0" style="color: #d9a752;">Rp <span id="price-paket">35000</span></h6>
                            <div class="d-flex justify-content-between align-items-center my-2 px-2">
                                <button class="btn btn-sm btn-outline-dark" onclick="changeMenu('paket', -1)"><i class="bi bi-chevron-left"></i></button>
                                <span id="name-paket" class="fw-bold small text-uppercase">Paket 1</span>
                                <button class="btn btn-sm btn-outline-dark" onclick="changeMenu('paket', 1)"><i class="bi bi-chevron-right"></i></button>
                            </div>
                            <div class="d-flex justify-content-center align-items-center gap-2 mt-2">
                                <button class="btn btn-sm btn-success" onclick="changeQty('paket', 1)"><i class="bi bi-plus-lg"></i></button>
                                <span id="qty-paket" class="fw-bold px-3 border border-secondary rounded bg-light">0</span>
                                <button class="btn btn-sm btn-danger" onclick="changeQty('paket', -1)"><i class="bi bi-dash-lg"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="text-center mt-4">
                <a href="bayar.html" class="btn btn-warning btn-lg px-5 fw-bold text-white shadow" onclick="saveCartToPayment()" style="background-color: #d9a752; border-color: #d9a752;">Lanjut Ke Pembayaran</a>
            </div>

        </div>
    </div>

</body>
</html>
